name: Repository checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: repository-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate tracked sources
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64, upcloud, build]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate repository
        run: python3 scripts/validate_repository.py

      - name: Verify Git object graph
        run: git fsck --full --no-dangling

  security:
    name: Dependency security audit
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64, upcloud, build]
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 11.15.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.22.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit JavaScript dependencies
        run: pnpm security:audit:node

      - name: Install pinned RustSec auditor
        run: cargo install cargo-audit --locked --version 0.22.2

      - name: Audit Rust dependencies
        run: pnpm security:audit:rust

  website:
    name: Website quality gate
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64, upcloud, build]
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 11.15.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.22.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust formatting component
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types and Astro templates
        run: pnpm check

      - name: Lint source
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Run unit tests
        run: pnpm test

      - name: Build static website
        run: pnpm build

      - name: Validate generated website
        run: pnpm validate:dist

      - name: Install Chromium for browser checks
        run: pnpm --filter @quireforge/website exec playwright install chromium

      - name: Run responsive and accessibility checks
        run: pnpm --filter @quireforge/website test:e2e

  desktop:
    name: Desktop quality gate
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64, upcloud, build]
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 11.15.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.22.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust with formatting and linting components
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Check desktop types
        run: pnpm --filter @quireforge/desktop check

      - name: Lint desktop source
        run: pnpm --filter @quireforge/desktop lint

      - name: Check desktop formatting
        run: pnpm --filter @quireforge/desktop format:check

      - name: Run desktop frontend tests
        run: pnpm --filter @quireforge/desktop test

      - name: Build desktop frontend
        run: pnpm --filter @quireforge/desktop build

      - name: Validate desktop performance budgets
        run: pnpm --filter @quireforge/desktop validate:dist

      - name: Install Chromium for desktop browser checks
        run: pnpm --filter @quireforge/desktop exec playwright install chromium

      - name: Run desktop accessibility and responsive checks
        run: pnpm --filter @quireforge/desktop test:e2e

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Lint native code
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Run native tests
        run: cargo test --locked --workspace

      - name: Build the unbundled desktop executable
        run: pnpm desktop:build
