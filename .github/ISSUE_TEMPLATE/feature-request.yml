name: Feature request
description: Propose a roadmap-aligned QuireForge improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should QuireForge solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
      description: Describe the workflow without assuming an undocumented Codex or ChatGPT interface.
    validations:
      required: true
  - type: dropdown
    id: boundary
    attributes:
      label: Likely implementation boundary
      options:
        - Stable official interface
        - Experimental official interface
        - Local QuireForge functionality
        - Unknown or unsupported
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and privacy considerations
      description: Note filesystem, command, Git, credential, connector, marketplace, or MCP implications.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched the roadmap and existing issues.
          required: true
        - label: This request does not depend on scraping ChatGPT or using private endpoints.
          required: true
