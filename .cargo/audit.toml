[advisories]
ignore = [
  # Tauri 2's supported Linux WebKit/GTK3 runtime currently carries the
  # unmaintained gtk-rs 0.18 line. Revisit on every Tauri update and before
  # release; these cannot be removed independently without replacing Tauri's
  # Linux runtime.
  "RUSTSEC-2024-0411",
  "RUSTSEC-2024-0412",
  "RUSTSEC-2024-0413",
  "RUSTSEC-2024-0414",
  "RUSTSEC-2024-0415",
  "RUSTSEC-2024-0416",
  "RUSTSEC-2024-0417",
  "RUSTSEC-2024-0418",
  "RUSTSEC-2024-0419",
  "RUSTSEC-2024-0420",
  # glib 0.18's proc macro and iterator advisories are inherited through the
  # same Tauri/GTK3 graph. QuireForge does not call VariantStrIter directly.
  "RUSTSEC-2024-0370",
  "RUSTSEC-2024-0429",
  # urlpattern -> unic-ucd-ident is inherited from tauri-utils. These notices
  # are maintenance status only and do not currently report an exploit.
  "RUSTSEC-2025-0075",
  "RUSTSEC-2025-0080",
  "RUSTSEC-2025-0081",
  "RUSTSEC-2025-0098",
  "RUSTSEC-2025-0100",
]
